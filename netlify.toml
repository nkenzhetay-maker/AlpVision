[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[functions]]
  path = "netlify/functions/generate-bg.js"
  [functions.generate-bg]
    timeout = 30

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
