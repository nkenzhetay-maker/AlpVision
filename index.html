<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AlpVision — TRT Russian Visual Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --trt:#20A9CF;--trt-dk:#0D7A96;
  --red:#CC0000;--red-dk:#990000;
  --navy:#0D1B2E;--navy3:#1A3A6B;
  --ui-bg:#0e0e0e;--ui-s:#141414;--ui-p:#1a1a1a;
  --ui-b:#252525;--ui-b2:#333;
  --muted:#5a5a5a;--muted2:#888;--txt:#e8e8e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Manrope,sans-serif;background:var(--ui-bg);color:var(--txt);padding:20px;overflow-x:hidden;}
.app-container{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:380px 1fr 420px;gap:20px;height:calc(100vh - 40px);min-height:700px;}
.panel{background:var(--ui-p);border:1px solid var(--ui-b);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;}
.p-hd{padding:15px 20px;background:var(--ui-s);border-bottom:1px solid var(--ui-b);display:flex;justify-content:between;align-items:center;}
.p-hd h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);font-weight:700;}
.p-bd{padding:20px;flex:1;overflow-y:auto;}

/* Form Elemanları */
textarea, input, select{width:100%;background:var(--ui-s);border:1px solid var(--ui-b);border-radius:6px;color:#fff;padding:12px;font-family:inherit;font-size:13px;transition:all .2s;margin-bottom:15px;resize:none;}
textarea:focus, input:focus, select:focus{border-color:var(--trt);outline:none;}
label{display:block;font-size:11px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;font-weight:700;letter-spacing:.5px;}

/* Butonlar */
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
.btn{background:var(--trt);color:#fff;border:none;padding:12px 20px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{background:var(--trt-dk);}
.btn:disabled{background:var(--ui-b);color:var(--muted);cursor:not-allowed;}
.btn-sec{background:var(--ui-b);color:#fff;}
.btn-sec:hover{background:var(--ui-b2);}
.btn-act{background:#d4af37;color:#000;font-weight:700;}
.btn-act:hover{background:#b89628;}

/* Content Type Selector */
.ct-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:15px;}
.ct-btn{background:var(--ui-s);border:1px solid var(--ui-b);padding:10px 4px;border-radius:6px;font-size:11px;text-transform:uppercase;font-weight:700;color:var(--muted2);cursor:pointer;text-align:center;transition:all .2s;}
.ct-btn:hover{border-color:var(--ui-b2);color:#fff;}
.ct-btn.on{background:var(--trt);border-color:var(--trt);color:#fff;}

/* Arka Plan Seçenekleri */
.bg-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px;}
.bg-opt{background:var(--ui-s);border:1px solid var(--ui-b);padding:10px;border-radius:6px;font-size:12px;text-align:center;cursor:pointer;color:var(--muted2);font-weight:600;}
.bg-opt.on{border-color:var(--trt);color:#fff;background:rgba(32,169,207,.05);}

/* Orta Önizleme Alanı */
.preview-panel{background:#050505;display:flex;flex-direction:column;position:relative;}
.canvas-container{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden;}
.editorial-canvas{width:540px;height:540px;background:#111;box-shadow:0 20px 50px rgba(0,0,0,.8);position:relative;overflow:hidden;transition:all .3s;}

/* Status Bar */
.status-bar{background:var(--ui-s);border-top:1px solid var(--ui-b);padding:10px 20px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted2);}
.sdot{width:8px;height:8px;background:var(--muted);border-radius:50%;}
.sdot.on{background:#00cc66;box-shadow:0 0 10px #00cc66;animation:pulse 1.5s infinite;}
.sdot.err{background:var(--red);box-shadow:0 0 10px var(--red);}
@keyframes pulse{0%{opacity:1;}50%{opacity:.4;}100%{opacity:1;}}

/* Sağ Editoryal Panel */
.meta-item{background:var(--ui-s);border:1px solid var(--ui-b);border-radius:6px;padding:12px;margin-bottom:12px;font-size:12px;}
.meta-title{font-weight:700;color:var(--muted2);text-transform:uppercase;font-size:10px;margin-bottom:4px;letter-spacing:.5px;}
.meta-val{color:#fff;line-height:1.4;}

/* Önbellek ve Hafıza Sayacı */
#memory-counter {display:inline-flex;align-items:center;background:rgba(212,175,55,0.1);border:1px solid #d4af37;color:#d4af37;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;}
</style>
</head>
<body>

<div class="app-container">
  <div class="panel">
    <div class="p-hd">
      <h2>Входные данные</h2>
    </div>
    <div class="p-bd">
      <label>Тип контента</label>
      <div class="ct-selector">
        <div class="ct-btn on" data-ct="news">News</div>
        <div class="ct-btn" data-ct="feature">Feature</div>
        <div class="ct-btn" data-ct="article">Article</div>
        <div class="ct-btn" data-ct="qa">Q&A</div>
      </div>

      <label>Текст новости / Сюжет</label>
      <textarea id="txt" style="height:160px;" placeholder="Вставьте сюда текст новости или тезисы для аналитики..."></textarea>

      <div class="btn-group">
        <button class="btn" id="btn-an" onclick="runAnalysis()">✨ Анализ</button>
        <button class="btn btn-sec btn-act" id="alt-btn" onclick="generateAlt()">🔄 Альтернатива</button>
      </div>

      <hr style="border:0;border-top:1px solid var(--ui-b);margin:20px 0;">

      <label>Режим бэкграунда</label>
      <div class="bg-options">
        <div class="bg-opt on" data-bg="ai">AI Art</div>
        <div class="bg-opt" data-bg="photo">Фото</div>
        <div class="bg-opt" data-bg="solid">Заливка</div>
      </div>

      <div id="ai-prompt-area">
        <label>DALL-E Prompt</label>
        <textarea id="ai-prompt" style="height:100px;" placeholder="Промпт для генерации..."></textarea>
        <button class="btn btn-sec" style="width:100%;" onclick="triggerBgRegen()">🎨 Перегенерировать арт</button>
      </div>
    </div>
  </div>

  <div class="panel preview-panel">
    <div class="p-hd" style="justify-content:space-between;display:flex;width:100%;">
      <h2>Эскиз обложки</h2>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-sec" style="padding:6px 12px;font-size:12px;" onclick="changeAspectRatio('1:1')">1:1</button>
        <button class="btn btn-sec" style="padding:6px 12px;font-size:12px;" onclick="changeAspectRatio('16:9')">16:9</button>
      </div>
    </div>
    <div class="canvas-container">
      <div class="editorial-canvas" id="canvas">
        </div>
    </div>
    <div class="status-bar">
      <div class="sdot" id="sdot"></div>
      <span id="stxt">Система готова к работе</span>
    </div>
  </div>

  <div class="panel">
    <div class="p-hd" style="display:flex;justify-content:space-between;align-items:center;width:100%;">
      <h2>Эдиториал Анализ</h2>
      <div id="memory-counter" style="display:none;">🧠 HAFIZA: <span id="memory-count">0</span></div>
    </div>
    <div class="p-bd">
      <label>Заголовок (Headline)</label>
      <input type="text" id="m-hl" oninput="syncStateAndRender()">

      <label>Подзаголовок (Subheading)</label>
      <textarea id="m-sub" style="height:70px;" oninput="syncStateAndRender()"></textarea>

      <label>Категория (Category)</label>
      <input type="text" id="m-cat" oninput="syncStateAndRender()">

      <div class="meta-item">
        <div class="meta-title">Визуальная Метафора (Claude)</div>
        <div class="meta-val" id="v-meta">Ожидание анализа...</div>
      </div>

      <div class="meta-item">
        <div class="meta-title">Цветовая схема</div>
        <div class="meta-val" id="v-colors">-</div>
      </div>

      <button class="btn" style="width:100%;margin-top:15px;background:#00cc66;" onclick="exportFinalImage()">💾 Экспорт готового изображения</button>
      <button class="btn btn-sec" style="width:100%;margin-top:10px;font-size:11px;color:var(--red);" onclick="resetMemory()">🗑 Сбросить стиль-память</button>
    </div>
  </div>
</div>

<script>
// Global Uygulama State Yapısı
var S = {
  hl: "Заголовок новости",
  sub: "Краткое описание или подзаголовок, раскрывающий суть",
  cat: "МИР",
  colorScheme: "dark",
  aiTpl: "news",
  bg: { type: "solid", color: "#1a1a1a", url: "", base64: "" },
  aspect: "1:1"
};

// Global Hafıza ve Alternatif Seçim Endeksi
var _currentNewsText = "";
var _currentCType = "news";
var _altStrategyIdx = 0;

// Sayfa ilk yüklendiğinde
document.addEventListener("DOMContentLoaded", function() {
  initEventListeners();
  renderPreview();
});

function initEventListeners() {
  document.querySelectorAll('.ct-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.ct-btn').forEach(b => b.classList.remove('on'));
      this.classList.add('on');
      S.aiTpl = this.dataset.ct;
      renderPreview();
    });
  });

  document.querySelectorAll('.bg-opt').forEach(opt => {
    opt.addEventListener('click', function() {
      document.querySelectorAll('.bg-opt').forEach(o => o.classList.remove('on'));
      this.classList.add('on');
      S.bg.type = this.dataset.bg;
      if(S.bg.type === 'solid') S.bg.color = "#152238";
      renderPreview();
    });
  });
}

function setSt(msg, type) {
  var txtEl = document.getElementById('stxt');
  var dotEl = document.getElementById('sdot');
  if(!txtEl || !dotEl) return;
  txtEl.innerText = msg;
  if(type === 'err') dotEl.className = "sdot err";
  else if(type === 'on') dotEl.className = "sdot on";
  else dotEl.className = "sdot";
}

function changeAspectRatio(ratio) {
  S.aspect = ratio;
  var canvas = document.getElementById('canvas');
  if(ratio === '16:9') {
    canvas.style.width = "560px";
    canvas.style.height = "315px";
  } else {
    canvas.style.width = "500px";
    canvas.style.height = "500px";
  }
  renderPreview();
}

function syncStateAndRender() {
  S.hl = document.getElementById('m-hl').value;
  S.sub = document.getElementById('m-sub').value;
  S.cat = document.getElementById('m-cat').value;
  renderPreview();
}

// ── KANVAS EDİTORYAL ÇİZİM MOTORU (RENDER) ──
function renderPreview() {
  var canvas = document.getElementById('canvas');
  if(!canvas) return;
  
  canvas.innerHTML = "";
  canvas.style.backgroundColor = S.bg.type === 'solid' ? S.bg.color : '#0f172a';

  // Eğer arka plan AI Art veya Fotoğraf ise katman ekle
  if((S.bg.type === 'ai' || S.bg.type === 'photo') && (S.bg.base64 || S.bg.url)) {
    var bgLayer = document.createElement('div');
    bgLayer.style.position = "absolute";
    bgLayer.style.top = "0";
    bgLayer.style.left = "0";
    bgLayer.style.width = "100%";
    bgLayer.style.height = "100%";
    bgLayer.style.backgroundImage = "url('" + (S.bg.base64 || S.bg.url) + "')";
    bgLayer.style.backgroundSize = "cover";
    bgLayer.style.backgroundPosition = "center";
    canvas.appendChild(bgLayer);

    // Tipografinin okunması için degrade gölge katmanı ekle
    var overlay = document.createElement('div');
    overlay.style.position = "absolute";
    overlay.style.top = "0";
    overlay.style.left = "0";
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.background = "linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.1) 100%)";
    canvas.appendChild(overlay);
  }

  // Editoryal Yazı Konteyneri
  var metaWrap = document.createElement('div');
  metaWrap.style.position = "absolute";
  metaWrap.style.bottom = "0";
  metaWrap.style.left = "0";
  metaWrap.style.width = "100%";
  metaWrap.style.padding = S.aspect === '16:9' ? "20px" : "35px";
  metaWrap.style.color = "#ffffff";
  metaWrap.style.zIndex = "10";

  // Kategori (Üst Küçük Başlık)
  if(S.cat) {
    var catEl = document.createElement('div');
    catEl.innerText = S.cat.toUpperCase();
    catEl.style.fontFamily = "Oswald, sans-serif";
    catEl.style.fontSize = "13px";
    catEl.style.color = varColorAccent();
    catEl.style.letterSpacing = "2px";
    catEl.style.fontWeight = "700";
    catEl.style.marginBottom = "8px";
    metaWrap.appendChild(catEl);
  }

  // Ana Başlık
  var hlEl = document.createElement('div');
  hlEl.innerText = S.hl;
  hlEl.style.fontFamily = S.aiTpl === 'feature' ? "'Playfair Display', serif" : "Oswald, sans-serif";
  hlEl.style.fontSize = S.aspect === '16:9' ? "24px" : "32px";
  hlEl.style.lineHeight = "1.2";
  hlEl.style.fontWeight = "900";
  hlEl.style.marginBottom = "10px";
  hlEl.style.textShadow = "0 2px 10px rgba(0,0,0,0.5)";
  metaWrap.appendChild(hlEl);

  // Alt Başlık
  if(S.sub) {
    var subEl = document.createElement('div');
    subEl.innerText = S.sub;
    subEl.style.fontFamily = "Manrope, sans-serif";
    subEl.style.fontSize = "13px";
    subEl.style.opacity = "0.85";
    subEl.style.lineHeight = "1.4";
    metaWrap.appendChild(subEl);
  }

  canvas.appendChild(metaWrap);
}

function varColorAccent() {
  if(S.aiTpl === 'feature') return "#d4af37"; // Altın Sarısı
  if(S.aiTpl === 'article') return "#20A9CF"; // TRT Mavisi
  return "#CC0000"; // Canlı Kırmızı
}

// ── ANA ANALİZ AKIŞI (✨ ANALİZ BUTONU) ──
async function runAnalysis() {
  var textEl = document.getElementById('txt');
  if(!textEl || !textEl.value.trim()) {
    alert("Пожалуйста, введите текст новости.");
    return;
  }
  
  _currentNewsText = textEl.value.trim();
  _currentCType = document.querySelector('.ct-btn.on').dataset.ct;

  setSt('🧠 Claude Sonnet анализирует контекст сюжета...', 'on');

  try {
    var res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: _currentNewsText, contentType: _currentCType })
    });
    
    var data = await res.json();
    renderEditorialPanel(data);
  } catch(e) {
    setSt('Ошибка анализа: ' + e.message, 'err');
  }
}

// ── KUSURSUZ ALTERNATİF ÜRETİM MOTORU (🔄 ALTERNATİVA BUTONU) ──
async function generateAlt() {
  const btn = document.getElementById('alt-btn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Альтернатива...';
  }
  
  var txt = _currentNewsText || document.getElementById('txt')?.value?.trim();
  if (!txt) {
    setSt('⚠ Önce analiz yapın — metin boş', 'err');
    if (btn) { btn.disabled = false; btn.textContent = '🔄 Альтернатива'; }
    return;
  }
  
  _currentNewsText = txt;
  _currentCType = document.querySelector('.ct-btn.on')?.dataset?.ct || S.aiTpl || 'news';

  var strategies = [
    'different metaphor, more minimalist and sharp, extreme negative space',
    'alternative symbolic composition with heavy white space and irony',
    'completely abstract approach using political geometry and color contrast',
    'highly ironic visual contradiction, surreal scale asymmetry like a Magritte painting',
    'data-driven composition, one dominant number or statistic as central element',
    'silhouette composition, single dark shape against solid color background',
    'diptych concept, two contrasting elements side by side on split background'
  ];
  
  var strategy = strategies[_altStrategyIdx % strategies.length];
  _altStrategyIdx++;

  var finalSystemInstruction = `\n\n[CRITICAL ALTERNATIVE STRATEGY]: For this execution, you MUST use this specific aesthetic/conceptual strategy: "${strategy}". Avoid previous literal concepts. Force a completely different metaphorical approach.`;

  setSt('Применение стратегии: ' + strategy.slice(0, 30) + '...', 'on');

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: _currentNewsText,        // Düzeltildi: Backend uyumluluğu sağlandı
        contentType: _currentCType,
        _altMode: true,
        _strategy: strategy,
        finalSystem: finalSystemInstruction 
      })
    });

    if (!response.ok) throw new Error('API hatası: ' + response.status);
    const data = await response.json();
    
    if (data && data.headline) {
      renderEditorialPanel(data);
    } else {
      throw new Error('Geçersiz analiz verisi döndü');
    }
  } catch (e) {
    setSt('Alternatif üretilemedi: ' + e.message, 'err');
    console.error('generateAlt Error:', e);
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = '🔄 Альтернатива';
    }
  }
}

function renderEditorialPanel(data) {
  S.hl = data.headline || S.hl;
  S.sub = data.subheading || "";
  S.cat = data.category || S.cat;
  S.colorScheme = data.colorScheme || "dark";
  
  document.getElementById('m-hl').value = S.hl;
  document.getElementById('m-sub').value = S.sub;
  document.getElementById('m-cat').value = S.cat;
  
  document.getElementById('v-meta').innerText = data.economistMetaphor || "Описания нет";
  document.getElementById('v-colors').innerText = S.colorScheme;

  if(data.styleMemoryCount) {
    var memEl = document.getElementById('memory-counter');
    var memCnt = document.getElementById('memory-count');
    if(memEl && memCnt) { memEl.style.display = ""; memCnt.innerText = data.styleMemoryCount; }
  }

  if(data.dallePrompt) {
    document.getElementById('ai-prompt').value = data.dallePrompt;
    if(document.querySelector('.bg-opt.on').dataset.bg === 'ai') {
      generateDalleBg(data.dallePrompt);
    } else {
      renderPreview();
    }
  } else {
    renderPreview();
  }
}

async function generateDalleBg(prompt) {
  setSt('🎨 DALL-E генерирует арт...', 'on');
  try {
    var res = await fetch('/api/generate-bg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt, size: S.aspect === '16:9' ? "1792x1024" : "1024x1024" })
    });
    var bgData = await res.json();
    if(bgData.base64) {
